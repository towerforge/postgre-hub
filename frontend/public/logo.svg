<svg width="320" height="320" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal frame -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#9eb87f" stroke-width="2"/>

  <g filter="url(#glow)" fill="#9eb87f">
    <!-- "P" -->
    <rect x="14" y="18" width="3"  height="28"/>
    <rect x="14" y="18" width="13" height="3"/>
    <rect x="24" y="18" width="3"  height="11"/>
    <rect x="14" y="26" width="13" height="3"/>

    <!-- "H" -->
    <rect x="37" y="18" width="3"  height="28"/>
    <rect x="47" y="18" width="3"  height="28"/>
    <rect x="37" y="30" width="13" height="3"/>
  </g>
</svg>
